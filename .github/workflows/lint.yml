name: Run Unit Test via Pytest

on:
  pull_request:
  push:
    branches:
      - "master"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
        pull-requests: write
        contents: write
        checks: write
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup PDM
        uses: pdm-project/setup-pdm@94a823180e06fcde4ad29308721954a521c96ed0 # v4
      - name: Install dependencies
        run: pdm install
      - name: Lint with black
        uses: psf/black@87928e6d6761a4a6d22250e1fee5601b3998086e # stable
        with:
          options: "--check --verbose"
      - name: Test with pytest
        run: |
          pdm run pytest --junit-xml=test-results.xml
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        if: always()
        with:
          files: |
            test-results.xml
      - name: Test with coverage
        run: |
          pdm run coverage run -m pytest -v -s
      - name: Generate Coverage Report
        run: |
          pdm run coverage report -m
      - name: Coverage comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@53ff7553078bad69030786e486677315346c2dd2 # v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Store Pull Request comment to be posted
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt
